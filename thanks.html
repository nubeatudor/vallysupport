<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Request Sent | Vally’s Afterhours Support</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Modern Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 font-['Inter'] antialiased text-slate-100 min-h-screen flex items-center justify-center">

    <div class="max-w-xl w-full px-6 text-center">
        <!-- Success Icon -->
        <div class="mb-10 relative inline-block">
            <div class="w-24 h-24 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto border border-blue-500/30">
                <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <!-- Decorative pulse -->
            <div class="absolute inset-0 w-24 h-24 bg-blue-500 rounded-full animate-ping opacity-20 mx-auto"></div>
        </div>

        <h1 class="text-4xl md:text-5xl font-extrabold mb-6 tracking-tight text-white">
            Thank you, your request was sent.
        </h1>
        
        <p class="text-xl text-slate-400 mb-10 leading-relaxed">
            We’ve received your details. Valentin or a team member will reach out to you within our <span class="text-blue-400 font-bold">10-minute</span> target response window.
        </p>

        <div class="space-y-4">
            <a href="index.html" class="inline-block bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-xl font-bold text-lg transition-all shadow-xl shadow-blue-600/20">
                Return to Website
            </a>
            <p class="text-slate-500 text-sm">
                Redirecting automatically in <span id="countdown">10</span> seconds...
            </p>
        </div>
    </div>

    <script>
        // Automatic redirection logic
        let count = 10;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            count--;
            countdownElement.textContent = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
